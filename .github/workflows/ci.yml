# Generated by GitHub Copilot
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: pizzeria-fullstack-ordering-platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: API smoke check
        run: |
          node --input-type=module -e "import request from 'supertest'; import { app, resetAppState } from './server/index.js'; resetAppState(); const response = await request(app).get('/health'); if (response.status !== 200) { throw new Error('Health endpoint failed'); } console.log(response.body);"
