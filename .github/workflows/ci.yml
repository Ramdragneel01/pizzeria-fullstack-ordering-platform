# Generated by GitHub Copilot
name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run dependency audit
        run: npm audit --omit=dev

      - name: API smoke check
        run: |
          node --input-type=module -e "import request from 'supertest'; import { app, resetAppState } from './server/index.js'; resetAppState(); const response = await request(app).get('/health'); if (response.status !== 200) { throw new Error('Health endpoint failed'); } console.log(response.body);"
